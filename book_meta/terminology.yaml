# terminology.yaml — контролируемый словарь книги.
#
# Источник истины для ЕДИНОГО написания терминов в прозе. Его читает
# проверка check_terminology (Группа B): если в тексте встречается
# запрещённый вариант термина вместо канона — выдаёт находку
# noncanonical_term (warning) с указанием на канон.
#
# Это НЕ про разметку терминов (тем занимается check_terms, сверяя
# **[термин]{определение}**) и НЕ про стиль/канцелярит (check_styleguide).
# Здесь — только консистентность словаря: один концепт = одно слово.
#
# Формат:
#   terms:
#     - canon: <каноничное написание>
#       variants: [<вариант1>, <вариант2>, ...]   # запрещённые синонимы/кальки
#       note: <необязательная заметка>            # попадёт в текст находки
#
# Как ловятся варианты:
#   - регистр игнорируется;
#   - русские окончания терпятся: «определитель» поймает «определителя»,
#     «определителем», «определители» (матч от начала слова + хвост);
#   - инлайн-математика $...$ и backtick-код пропускаются;
#   - вариант, совпадающий с самим каноном, игнорируется (нет самопометки);
#   - дедуп по варианту: одна находка на вариант, с номером первой строки
#     и суммарным числом вхождений.
#
# Строгость noncanonical_term — warning по умолчанию; точечно меняется
# через book_meta/checks_config.yaml (напр. поднять до error или off).
#
# Если файла нет, он пуст или битый — check_terminology молча молчит.
#
# ── Примеры (раскомментируй и наполни под книгу) ─────────────────────
#
# terms:
#   - canon: определитель
#     variants: [детерминант]
#     note: в книге единый термин — «определитель»
#
#   - canon: собственное значение
#     variants: [собственное число, eigenvalue]
#     note: «значение», не «число»
#
#   - canon: линейное отображение
#     variants: [линейное преобразование]
#     note: «отображение» как общий термин; «оператор» — только для V→V
